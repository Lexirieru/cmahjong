services:
  postgres:
    image: postgres:16-alpine
    container_name: cmahjong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmahjong
      POSTGRES_PASSWORD: cmahjong
      POSTGRES_DB: cmahjong
    ports:
      - "5432:5432"
    volumes:
      - cmahjong_pgdata:/var/lib/postgresql/data

volumes:
  cmahjong_pgdata:
