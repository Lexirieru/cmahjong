[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
evm_version = "cancun"       # Celo L2 (OP Stack) mendukung Cancun; OZ v5 butuh opcode mcopy
optimizer = true
optimizer_runs = 200

# RPC endpoint dibaca dari .env (CELO_RPC). Untuk testing ganti ke Alfajores.
[rpc_endpoints]
celo = "${CELO_RPC}"
alfajores = "https://alfajores-forno.celo-testnet.org"

# Verifikasi kontrak via Celoscan (Etherscan v2 multichain API).
[etherscan]
celo = { key = "${ETHERSCAN_API_KEY}", chain = 42220 }
alfajores = { key = "${ETHERSCAN_API_KEY}", chain = 44787 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
